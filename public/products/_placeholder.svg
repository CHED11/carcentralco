<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-label="Poster artwork placeholder">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="0.55" stop-color="#c9c9c9"/>
      <stop offset="1" stop-color="#8a8a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="#101012"/>
  <rect width="900" height="1200" fill="url(#glow)"/>
  <rect x="40" y="40" width="820" height="1120" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <g font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="450" y="560" fill="#8a8a8a" font-size="26" letter-spacing="10">CARCENTRALCO</text>
    <text x="450" y="640" fill="url(#silver)" font-size="64" letter-spacing="4">Poster Artwork</text>
    <text x="450" y="700" fill="#9a9a9a" font-family="system-ui, sans-serif" font-size="22" letter-spacing="6">IMAGE COMING SOON</text>
  </g>
</svg>
